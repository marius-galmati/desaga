# Local development backing services only — apps run via `pnpm dev`.
# Prod compose (caddy, app images, backup, minio lifecycle rules) comes with
# the deploy increment.
name: boca-dev

services:
  postgres:
    # Prod pins the minor version; dev floats on the major.
    image: postgres:16
    environment:
      POSTGRES_DB: boca
      POSTGRES_USER: boca
      POSTGRES_PASSWORD: boca
    ports:
      # Override with BOCA_PG_PORT when a local PostgreSQL already owns 5432.
      - "127.0.0.1:${BOCA_PG_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boca -d boca"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest # TODO: pin a RELEASE.* tag before prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: boca
      MINIO_ROOT_PASSWORD: boca-dev-password
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest # TODO: pin before prod
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 boca boca-dev-password &&
      mc mb --ignore-existing local/boca-media &&
      echo 'bucket boca-media ready'
      "

volumes:
  pg_data:
  redis_data:
  minio_data:
